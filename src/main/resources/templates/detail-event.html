<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Detail Event</title>

<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">
<h2>EVENTIPWIJA</h2>
</div>

</div>

<div class="main">

<div class="navbar">
<h2>Detail Event</h2>
</div>

<div class="event-card">

<h1 th:text="${event.namaEvent}">
Nama Event
</h1>

<br>

<p>
<b>Tanggal :</b>
<span th:text="${event.tanggal}"></span>
</p>

<br>

<p>
<b>Lokasi :</b>
<span th:text="${event.lokasi}"></span>
</p>

<br>

<p>
<b>Kuota :</b>
<span th:text="${event.kuota}"></span>
</p>

<br>

<p>
<b>Status :</b>
<span th:text="${event.status}"></span>
</p>

<br>

<p th:text="${event.deskripsi}">
Deskripsi
</p>

<br>

<a class="btn"
   th:href="@{/register-event/{id}(id=${event.id})}">
Daftar Event
</a>

</div>

</div>

</div>

</body>
</html>
