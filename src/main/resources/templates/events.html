<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Daftar Event</title>

<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">
<h2>EVENTIPWIJA</h2>
</div>

<div class="menu">
<a href="/">Dashboard</a>
<a href="/events">Daftar Event</a>
<a href="/my-events">Event Saya</a>
<a href="/attendance">Absensi</a>
<a href="/certificates">Sertifikat</a>
<a href="/profile">Profil</a>
</div>

</div>

<div class="main">

<div class="navbar">
<h2>Daftar Event</h2>
</div>

<div class="event-card"
     th:each="event : ${events}">

<h2 th:text="${event.namaEvent}">
Nama Event
</h2>

<p>
Tanggal :
<span th:text="${event.tanggal}"></span>
</p>

<p>
Lokasi :
<span th:text="${event.lokasi}"></span>
</p>

<p>
Kuota :
<span th:text="${event.kuota}"></span>
</p>

<p>
Status :
<span th:text="${event.status}"></span>
</p>

<br>

<a class="btn"
   th:href="@{/event/{id}(id=${event.id})}">
Detail Event
</a>

</div>

</div>

</div>

</body>
</html>
